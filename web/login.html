<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - dladmin-go</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { width: 100%; max-width: 420px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.08); padding: 28px; }
        h1 { margin: 0 0 8px; font-size: 24px; color: #1f2937; }
        p { margin: 0 0 20px; color: #6b7280; font-size: 14px; }
        label { display: block; margin: 14px 0 6px; font-size: 14px; color: #374151; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        button { width: 100%; margin-top: 18px; padding: 12px 14px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .error { margin-top: 14px; padding: 10px 12px; border-radius: 8px; background: #fef2f2; color: #b91c1c; font-size: 13px; }
        .hint { margin-top: 16px; font-size: 12px; color: #9ca3af; text-align: center; }
    </style>
</head>
<body>
    <div class="wrap">
        <form class="card" method="post" action="/login">
            <h1>dladmin-go</h1>
            <p>纯 Go 单文件后台，登录后可上传、遍历和管理目录。</p>
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">登录后台</button>
            {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
            <div class="hint">默认账号：admin / admin123</div>
        </form>
    </div>
</body>
</html>
