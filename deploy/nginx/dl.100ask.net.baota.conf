server
{
    listen 80;
    listen 443 ssl http2;
    server_name dl.100ask.net;
    index index.html index.htm default.html;
    root /home1/dlfile;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate     /www/server/panel/vhost/cert/dl.100ask.net/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/dl.100ask.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5:!aNULL:!eNULL;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    # 不再使用 PHP 和 fancyindex，统一交给 Flask/Gunicorn

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md)$ {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout 600s;
        client_max_body_size 20G;
        proxy_buffering off;
    }

    access_log /www/wwwlogs/dl.100ask.net.log;
    error_log  /www/wwwlogs/dl.100ask.net.error.log;
}
